<text x="146" y="208" fill="#b5b3aa" font-size="10.5">Sign in, sign up, dashboard, admin sees user list</text>
<rect x="892" y="178" width="124" height="28" rx="14" fill="#633806" stroke="#ef9f27" stroke-width="1"/>
<text x="954" y="196" text-anchor="middle" fill="#facb75" font-size="10" font-weight="600">YOU ARE HERE</text>

