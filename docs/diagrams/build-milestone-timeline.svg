<svg width="100%" viewBox="0 0 1080 1200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Print Shop build timeline: the milestones m00-setup through m13-deploy on a vertical spine, each a teachable checkpoint, with the current position marked.</title>
<desc>A vertical timeline spine running top to bottom. Fifteen milestone boxes hang off it in order: M0 setup, M1 auth (you are here), M2 marketplace shell, M3 tiers, M4 roles, the optional M4.5 theme, M5 credits, M6 generate, M7 credits wired, M8 designs, M9 buy, M10 curation, M11 flagging, M12 treasury, M13 deploy. Each box carries its tag, session count and what students see at the end. Status dots mark done, the current milestone, optional, and not-yet-built.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1080" height="1200" fill="#1c1b19"/>

<text x="540" y="40" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">Build timeline &#8212; m00-setup to m13-deploy</text>
<text x="540" y="61" text-anchor="middle" fill="#b5b3aa" font-size="12">each milestone compiles, runs, and is teachable on its own &#183; ~22-28 sessions &#183; as of 2026-06-16</text>

<!-- spine -->
<line x1="80" y1="100" x2="80" y2="1150" stroke="#8a8980" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="80" y="92" text-anchor="middle" fill="#8a8980" font-size="10">build order &#8595;</text>

<!-- M0 done -->
<circle cx="80" cy="120" r="5" fill="#5dca8d"/><line x1="85" y1="120" x2="130" y2="120" stroke="#8a8980" stroke-width="1.25"/>
<rect x="130" y="91" width="900" height="58" rx="10" fill="#13301f" stroke="#5dca8d" stroke-width="0.75"/>
<text x="146" y="115" font-size="12.5"><tspan fill="#5dca8d" font-weight="600">M0 &#183; m00-setup</tspan><tspan fill="#faf9f5" dx="10" font-weight="600">Setup</tspan><tspan fill="#7d7c75" dx="10" font-size="9.5">1 session &#183; done</tspan></text>
<text x="146" y="136" fill="#b5b3aa" font-size="10.5">Dev server running, four placeholder pages, Convex connected</text>

