<rect x="36" y="450" width="276" height="28" rx="7" fill="#3b3a36" stroke="#b4b2a9" stroke-width="0.5"/><text x="48" y="468" font-size="10.5"><tspan fill="#d3d1c7">403 / 404 / 500</tspan><tspan fill="#b4b2a9" dx="10" font-size="9">error pages (M13)</tspan></text>
<text x="40" y="500" fill="#7d7c75" font-size="9">guest can browse + sign up; everything else needs a role</text>

