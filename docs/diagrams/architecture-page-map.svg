<svg width="100%" viewBox="0 0 1320 852" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Print Shop page and route map: every Astro route grouped by the four-folder role convention, gated by the middleware guard.</title>
<desc>A route map. An access ladder across the top shows roles are cumulative: Guest signs up to Member, who can be promoted to Moderator then Admin, and each role can reach every zone to its left. Below, four zones list every route: public pages open to all, the member zone under /mem, the moderator zone under /mod, and the admin zone under /admin including the three treasury views. The Astro middleware guard gates the three private zones by URL prefix. A core-journeys panel traces the discover-and-buy and create-and-sell flows through the pages.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1320" height="852" fill="#1c1b19"/>

<text x="660" y="36" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">Page &amp; route map</text>
<text x="660" y="57" text-anchor="middle" fill="#b5b3aa" font-size="12">Astro file-based routing, grouped by the four-folder role convention &#183; as of 2026-06-16</text>

