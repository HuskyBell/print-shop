<rect x="36" y="382" width="276" height="28" rx="7" fill="#3b3a36" stroke="#b4b2a9" stroke-width="0.5"/><text x="48" y="400" font-size="10.5"><tspan fill="#d3d1c7">/category/[slug]</tspan><tspan fill="#b4b2a9" dx="10" font-size="9">Category</tspan></text>
