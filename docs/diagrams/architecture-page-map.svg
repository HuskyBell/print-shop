<text x="24" y="820" fill="#b5b3aa" font-size="10">35 routes, all confirmed in MILESTONES.md. Auth and error pages have no fixed path in the docs yet, so they are labelled, not invented. The four-folder convention (pages/, pages/mem/, pages/mod/, pages/admin/) maps URL prefix to required role.</text>
<text x="24" y="838" fill="#b5b3aa" font-size="10">Source: MILESTONES.md (M1-M13 route lists), README (four-folder routing), docs/concepts/owner-permission-pattern.md (defense in depth).</text>
