<text x="375" y="98" text-anchor="middle" fill="#d3d1c7" font-size="12" font-weight="600">Guest</text>
<text x="470" y="88" text-anchor="middle" fill="#8a8980" font-size="9">sign up</text>
<line x1="442" y1="93" x2="498" y2="93" stroke="#8a8980" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="500" y="76" width="130" height="34" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.75"/>
<text x="565" y="98" text-anchor="middle" fill="#9fe1cb" font-size="12" font-weight="600">Member</text>
<text x="660" y="88" text-anchor="middle" fill="#8a8980" font-size="9">promote</text>
<line x1="632" y1="93" x2="688" y2="93" stroke="#8a8980" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="690" y="76" width="140" height="34" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.75"/>
<text x="760" y="98" text-anchor="middle" fill="#cecbf6" font-size="12" font-weight="600">Moderator</text>
<text x="860" y="88" text-anchor="middle" fill="#8a8980" font-size="9">promote</text>
<line x1="832" y1="93" x2="888" y2="93" stroke="#8a8980" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="890" y="76" width="130" height="34" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.75"/>
<text x="955" y="98" text-anchor="middle" fill="#facb75" font-size="12" font-weight="600">Admin</text>

<text x="660" y="128" text-anchor="middle" fill="#b5b3aa" font-size="10">access is cumulative &#8212; each role can also reach every zone to its left; zone colour = the minimum role the URL prefix requires</text>

<!-- ===== GUARD / OPEN TAGS ===== -->
<rect x="24" y="148" width="300" height="22" rx="6" fill="#0c3d28" stroke="#5dca8d" stroke-width="0.75"/>
<text x="174" y="163" text-anchor="middle" fill="#9ce6bb" font-size="10">open &#183; no sign-in required</text>

<rect x="336" y="148" width="960" height="22" rx="6" fill="#5b1717" stroke="#d98a8a" stroke-width="1" stroke-dasharray="5 3"/>
<text x="816" y="163" text-anchor="middle" fill="#f0c6c6" font-size="10">src/middleware.ts role guard &#8212; URL prefix maps to required role, otherwise 403  (then every Convex function re-checks)</text>

