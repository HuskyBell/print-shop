<svg width="100%" viewBox="0 0 1140 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>One sale, three ledger rows: how a single purchase mutation splits into a buyer charge, a designer payout and a platform cut, with rates snapshotted onto the row.</title>
<desc>A flow diagram. A buyer purchases a t-shirt for 60 credits. The placeOrder mutation runs as one atomic transaction: it validates the buyer's balance, snapshots the price, tier and share percentage, then writes three append-only creditTransactions rows - the buyer's purchase_charge of minus 60, the designer Luna's designer_payout of plus 30 carrying the frozen Maker 50 percent snapshot, and a platform_cut of plus 30 to the pool - while patching the creditBalances cache and incrementing the design's sales count. A reconciliation invariant and a snapshot rationale are called out.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1140" height="820" fill="#1c1b19"/>

<text x="570" y="38" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">One sale &#8594; three ledger rows</text>
<text x="570" y="59" text-anchor="middle" fill="#b5b3aa" font-size="12">a purchase splits into buyer charge + designer payout + platform cut, atomically &#183; as of 2026-06-16</text>

<!-- Buyer -->
<rect x="460" y="82" width="220" height="56" rx="10" fill="#085041" stroke="#5dcaa5" stroke-width="0.75"/>
<text x="570" y="104" text-anchor="middle" fill="#9fe1cb" font-size="12.5" font-weight="600">Buyer buys a t-shirt</text>
<text x="570" y="123" text-anchor="middle" fill="#c6efe0" font-size="10.5">product price: 60 credits</text>

<line x1="570" y1="138" x2="570" y2="176" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- placeOrder mutation -->
<rect x="290" y="178" width="560" height="100" rx="12" fill="#0c447c" stroke="#85b7eb" stroke-width="1"/>
<text x="570" y="200" text-anchor="middle" fill="#b5d4f4" font-size="13" font-weight="600">placeOrder() mutation &#8212; ONE atomic transaction</text>
<text x="306" y="222" fill="#85b7eb" font-size="10">1.&#160; validate buyer has &#8805; 60 credits</text>
<text x="306" y="240" fill="#85b7eb" font-size="10">2.&#160; snapshot price + tier + share% + credit-dollar value onto the order</text>
<text x="306" y="258" fill="#85b7eb" font-size="10">3.&#160; write THREE creditTransactions &#183; patch creditBalances &#183; salesCount++</text>
<text x="570" y="274" text-anchor="middle" fill="#d6e6f9" font-size="9.5" font-style="italic">all three rows commit together, or none do</text>

<!-- fan-out arrows -->
<line x1="500" y1="278" x2="240" y2="300" stroke="#5dcaa5" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="570" y1="278" x2="570" y2="300" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="640" y1="278" x2="905" y2="300" stroke="#ef9f27" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ROW 1: purchase_charge (buyer) -->
<rect x="70" y="302" width="320" height="150" rx="10" fill="#085041" stroke="#5dcaa5" stroke-width="0.75"/>
<text x="86" y="324" fill="#9fe1cb" font-size="12" font-weight="600">creditTransactions &#8212; row 1</text>
<text x="86" y="348" fill="#c6efe0" font-size="10.5">type:&#160; purchase_charge</text>
<text x="86" y="368" fill="#c6efe0" font-size="10.5">userId:&#160; buyer</text>
<text x="86" y="392" fill="#9fe1cb" font-size="15" font-weight="600">amount:&#160; &#8722;60</text>
<text x="86" y="416" fill="#5dcaa5" font-size="9.5">relatedDesignId, relatedOrderId</text>
<text x="86" y="434" fill="#5dcaa5" font-size="9.5">the buyer pays the full price</text>

<!-- ROW 2: designer_payout (Luna) with snapshots -->
<rect x="410" y="302" width="320" height="210" rx="10" fill="#0c3d28" stroke="#5dca8d" stroke-width="1"/>
<text x="426" y="324" fill="#9ce6bb" font-size="12" font-weight="600">creditTransactions &#8212; row 2</text>
<text x="426" y="348" fill="#d6f3e3" font-size="10.5">type:&#160; designer_payout</text>
<text x="426" y="368" fill="#d6f3e3" font-size="10.5">userId:&#160; Luna&#160;&#160;&#183;&#160;&#160;amount:&#160; +30</text>
<line x1="426" y1="380" x2="714" y2="380" stroke="#5dca8d" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="426" y="398" fill="#9ce6bb" font-size="10" font-weight="600">snapshots &#8212; frozen at write time</text>
<text x="426" y="418" fill="#d6f3e3" font-size="10">tierNameAtTransaction:&#160; 'Maker'</text>
<text x="426" y="436" fill="#d6f3e3" font-size="10">designerSharePercentAtTransaction:&#160; 50</text>
<text x="426" y="454" fill="#d6f3e3" font-size="10">creditDollarValueAtTransaction:&#160; 0.05</text>
<text x="426" y="472" fill="#d6f3e3" font-size="10">tierIdAtTransaction, relatedOrderId</text>
<text x="426" y="496" fill="#5dca8d" font-size="9.5">60 &#215; 50% = 30 &#8212; computed from the snapshot</text>

<!-- ROW 3: platform_cut -->
<rect x="750" y="302" width="320" height="150" rx="10" fill="#633806" stroke="#ef9f27" stroke-width="0.75"/>
<text x="766" y="324" fill="#facb75" font-size="12" font-weight="600">creditTransactions &#8212; row 3</text>
<text x="766" y="348" fill="#f6d9a4" font-size="10.5">type:&#160; platform_cut</text>
<text x="766" y="368" fill="#f6d9a4" font-size="10.5">isPoolTransaction:&#160; true</text>
<text x="766" y="392" fill="#facb75" font-size="15" font-weight="600">amount:&#160; +30</text>
<text x="766" y="416" fill="#ef9f27" font-size="9.5">the platform keeps the remainder</text>
<text x="766" y="434" fill="#ef9f27" font-size="9.5">60 &#8722; 30 = 30 to the pool</text>

<!-- cache + salesCount -->
<rect x="70" y="532" width="660" height="56" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="86" y="554" fill="#b5d4f4" font-size="11" font-weight="600">creditBalances cache &#8212; patched in the SAME mutation</text>
<text x="86" y="574" fill="#d6e6f9" font-size="10">buyer &#8722;60&#160;&#160;&#183;&#160;&#160;Luna +30&#160;&#160;&#183;&#160;&#160;platform pool +30&#160;&#160;(atomic with the ledger writes)</text>

<rect x="750" y="532" width="320" height="56" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="910" y="554" text-anchor="middle" fill="#b5d4f4" font-size="11" font-weight="600">design.salesCount += 1</text>
<text x="910" y="574" text-anchor="middle" fill="#d6e6f9" font-size="10">same transaction</text>

<!-- reconciliation invariant -->
<rect x="70" y="602" width="1000" height="48" rx="9" fill="#5b1717" stroke="#d98a8a" stroke-width="1"/>
<text x="86" y="622" fill="#f0c6c6" font-size="11" font-weight="600">Reconciliation invariant</text>
<text x="86" y="640" fill="#f0c6c6" font-size="10">for every user, creditBalances.balance == SUM(creditTransactions.amount). The ledger is the truth; the cache is an optimization. Drift = a bug.</text>

<!-- snapshot callout -->
<rect x="70" y="660" width="1000" height="48" rx="9" fill="#712b13" stroke="#f0997b" stroke-width="1"/>
<text x="86" y="680" fill="#f5c4b3" font-size="11" font-weight="600">Why snapshot the rate instead of joining the tier?</text>
<text x="86" y="698" fill="#f5c4b3" font-size="10">If Luna is promoted to Patron (75%) next month, this payout still reads Maker 50% &#8212; Treasury reports recomputed from the ledger reproduce the same numbers, forever.</text>

<!-- LEGEND -->
<rect x="70" y="730" width="12" height="12" rx="2" fill="#085041"/><text x="88" y="740" fill="#c2c0b6" font-size="10">buyer (member)</text>
<rect x="196" y="730" width="12" height="12" rx="2" fill="#0c3d28" stroke="#5dca8d" stroke-width="0.75"/><text x="214" y="740" fill="#c2c0b6" font-size="10">designer payout + snapshots</text>
<rect x="396" y="730" width="12" height="12" rx="2" fill="#633806"/><text x="414" y="740" fill="#c2c0b6" font-size="10">platform pool</text>
<rect x="520" y="730" width="12" height="12" rx="2" fill="#5b1717" stroke="#d98a8a" stroke-width="0.75"/><text x="538" y="740" fill="#c2c0b6" font-size="10">invariant / append-only</text>
<rect x="690" y="730" width="12" height="12" rx="2" fill="#712b13" stroke="#f0997b" stroke-width="0.75"/><text x="708" y="740" fill="#c2c0b6" font-size="10">snapshot rationale</text>

<!-- FOOTER -->
<text x="70" y="768" fill="#b5b3aa" font-size="10">Append-only: these three rows are never edited or deleted. A refund is new compensating rows, not an erasure. Hard-deleting a ledger row is denied for every role.</text>
<text x="70" y="786" fill="#b5b3aa" font-size="10">Source: MILESTONES M9 (buy flow), docs/concepts/snapshot-rule.md, append-only-ledger.md.</text>
</svg>
