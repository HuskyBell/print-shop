<svg width="100%" viewBox="0 0 1160 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Print Shop system shape: the Astro frontend, the Convex backend with its query/mutation/action trinity, and the external services it reaches.</title>
<desc>Three zones left to right. The Astro frontend (pages, layouts, React islands, and the middleware role guard) calls the Convex backend across the client/server boundary using useQuery, useMutation and useAction. The Convex backend holds queries (read-only, reactive), mutations (read-write, atomic) and actions (external, not transactional), plus the schema, file storage, scheduler and auth. Only actions reach external services: the OpenAI image API today, and Stripe and Cloudflare R2 in Phase 2.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1160" height="760" fill="#1c1b19"/>

<text x="580" y="38" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">Print Shop system shape</text>
<text x="580" y="59" text-anchor="middle" fill="#b5b3aa" font-size="12">Astro frontend &#183; Convex backend &#183; external services &#183; as of 2026-06-16</text>

<!-- ============ ASTRO FRONTEND ZONE ============ -->
<rect x="36" y="92" width="300" height="548" rx="14" fill="#45443f" stroke="#b4b2a9" stroke-width="0.75"/>
<text x="186" y="118" text-anchor="middle" fill="#d3d1c7" font-size="14" font-weight="600">Astro frontend &#8212; src/</text>
<circle cx="318" cy="106" r="4" fill="#5dca8d"/>

<rect x="52" y="132" width="268" height="150" rx="9" fill="#3b3a36" stroke="#b4b2a9" stroke-width="0.75"/>
<text x="186" y="152" text-anchor="middle" fill="#d3d1c7" font-size="12.5" font-weight="500">Pages &#8212; file-based routing</text>
<text x="68" y="173" fill="#b4b2a9" font-size="10.5">/  &#183;  /browse  &#183;  /design/[id]</text>
<text x="68" y="190" fill="#b4b2a9" font-size="10.5">/designer/[handle]</text>
<text x="68" y="211" fill="#b4b2a9" font-size="10.5">/mem/*&#160;&#160;&#8594; member</text>
<text x="68" y="228" fill="#b4b2a9" font-size="10.5">/mod/*&#160;&#160;&#8594; moderator</text>
<text x="68" y="245" fill="#b4b2a9" font-size="10.5">/admin/*&#160;&#8594; admin</text>
<text x="68" y="266" fill="#7d7c75" font-size="9.5">four-folder role convention</text>

<rect x="52" y="296" width="268" height="50" rx="9" fill="#3b3a36" stroke="#b4b2a9" stroke-width="0.75"/>
<text x="186" y="316" text-anchor="middle" fill="#d3d1c7" font-size="12.5" font-weight="500">Layouts</text>
<text x="186" y="334" text-anchor="middle" fill="#b4b2a9" font-size="10.5">BaseLayout.astro &#183; nav &#183; footer</text>

<rect x="52" y="360" width="268" height="150" rx="9" fill="#3b3a36" stroke="#b4b2a9" stroke-width="0.75"/>
<text x="186" y="380" text-anchor="middle" fill="#d3d1c7" font-size="12.5" font-weight="500">React islands (client:load)</text>
<text x="68" y="401" fill="#b4b2a9" font-size="10.5">useQuery()&#160;&#160;&#8212; reactive read</text>
<text x="68" y="420" fill="#b4b2a9" font-size="10.5">useMutation() &#8212; write</text>
<text x="68" y="439" fill="#b4b2a9" font-size="10.5">useAction()&#160;&#160;&#8212; external work</text>
<text x="68" y="464" fill="#7d7c75" font-size="9.5">The Convex client handles transport.</text>
<text x="68" y="479" fill="#7d7c75" font-size="9.5">No hand-written API routes exist.</text>
<text x="68" y="498" fill="#7d7c75" font-size="9.5">Function definitions ARE the API.</text>

<!-- middleware guard -->
<rect x="52" y="528" width="268" height="92" rx="9" fill="#5b1717" stroke="#d98a8a" stroke-width="1" stroke-dasharray="5 3"/>
<text x="186" y="549" text-anchor="middle" fill="#f0c6c6" font-size="12.5" font-weight="500">src/middleware.ts &#8212; role guard</text>
<text x="68" y="570" fill="#d98a8a" font-size="10.5">URL-prefix check &#8594; allow or 403</text>
<text x="68" y="587" fill="#d98a8a" font-size="10.5">layer 1 of defense in depth</text>
<text x="68" y="606" fill="#d98a8a" font-size="9.5">never the only guard &#8212; functions re-check</text>

<!-- ============ CLIENT / SERVER BOUNDARY ============ -->
<line x1="372" y1="92" x2="372" y2="640" stroke="#8a8980" stroke-width="1" stroke-dasharray="5 3"/>
<text x="372" y="84" text-anchor="middle" fill="#8a8980" font-size="10">client &#10072; server</text>

<!-- ============ CONVEX BACKEND ZONE ============ -->
<rect x="408" y="92" width="452" height="548" rx="14" fill="#0c447c" stroke="#85b7eb" stroke-width="0.75"/>
<text x="634" y="118" text-anchor="middle" fill="#b5d4f4" font-size="14" font-weight="600">Convex backend &#8212; convex/</text>
<circle cx="842" cy="106" r="4" fill="#5dca8d"/>

<rect x="424" y="132" width="420" height="80" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="438" y="152" fill="#b5d4f4" font-size="12.5" font-weight="500">queries &#8212; read-only &#183; reactive &#183; deterministic</text>
<text x="438" y="172" fill="#85b7eb" font-size="10.5">cannot write &#183; cannot call external APIs</text>
<text x="438" y="190" fill="#d6e6f9" font-size="10">e.g. getMyBalance() &#183; listMyDesigns() &#183; getDesign()</text>
<text x="438" y="206" fill="#85b7eb" font-size="9.5">subscribed clients auto-update when data changes</text>

<rect x="424" y="224" width="420" height="80" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="438" y="244" fill="#b5d4f4" font-size="12.5" font-weight="500">mutations &#8212; read + write &#183; atomic transaction</text>
<text x="438" y="264" fill="#85b7eb" font-size="10.5">all writes commit or all roll back &#183; cannot call APIs</text>
<text x="438" y="282" fill="#d6e6f9" font-size="10">e.g. startAndCharge() &#183; updateDesign() &#183; placeOrder()</text>
<text x="438" y="298" fill="#85b7eb" font-size="9.5">every one opens with requireAuth + requireRole/Owner</text>

<rect x="424" y="316" width="420" height="80" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="438" y="336" fill="#b5d4f4" font-size="12.5" font-weight="500">actions &#8212; external calls &#183; NOT transactional</text>
<text x="438" y="356" fill="#85b7eb" font-size="10.5">the only place fetch / OpenAI / Stripe may run</text>
<text x="438" y="374" fill="#d6e6f9" font-size="10">calls queries + mutations via runQuery / runMutation</text>
<text x="438" y="390" fill="#85b7eb" font-size="9.5">e.g. generateImage()</text>

<rect x="424" y="412" width="420" height="128" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="438" y="432" fill="#b5d4f4" font-size="12.5" font-weight="500">Database &#8212; convex/schema.ts (ctx.db)</text>
<text x="438" y="452" fill="#d6e6f9" font-size="9.5">users &#183; designs &#183; orders &#183; earningTiers &#183; stylePresets</text>
<text x="438" y="468" fill="#d6e6f9" font-size="9.5">generations &#183; productTypes &#183; categories &#183; collections &#183; flags</text>
<text x="438" y="490" fill="#f0c6c6" font-size="9.5">append-only: creditTransactions &#183; userRoleHistory &#183; userTierHistory</text>
<text x="438" y="506" fill="#d6e6f9" font-size="9.5">caches: creditBalances &#183; grantPool (singleton)</text>
<text x="438" y="528" fill="#85b7eb" font-size="9.5">schema-first: every table defined before any function reads it</text>

<rect x="424" y="552" width="135" height="72" rx="8" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="491" y="574" text-anchor="middle" fill="#b5d4f4" font-size="11" font-weight="500">File storage</text>
<text x="491" y="592" text-anchor="middle" fill="#85b7eb" font-size="9.5">ctx.storage</text>
<text x="491" y="608" text-anchor="middle" fill="#85b7eb" font-size="9.5">generated images</text>

<rect x="566" y="552" width="135" height="72" rx="8" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="633" y="574" text-anchor="middle" fill="#b5d4f4" font-size="11" font-weight="500">Scheduler</text>
<text x="633" y="592" text-anchor="middle" fill="#85b7eb" font-size="9.5">ctx.scheduler</text>
<text x="633" y="608" text-anchor="middle" fill="#85b7eb" font-size="9.5">rate-limit cleanup</text>

<rect x="708" y="552" width="136" height="72" rx="8" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="776" y="574" text-anchor="middle" fill="#b5d4f4" font-size="11" font-weight="500">Convex Auth</text>
<text x="776" y="592" text-anchor="middle" fill="#85b7eb" font-size="9.5">password only</text>
<text x="776" y="608" text-anchor="middle" fill="#85b7eb" font-size="9.5">no 3rd-party IdP</text>

<!-- ============ EXTERNAL ZONE ============ -->
<rect x="884" y="92" width="240" height="548" rx="14" fill="#633806" stroke="#ef9f27" stroke-width="0.75"/>
<text x="1004" y="118" text-anchor="middle" fill="#facb75" font-size="14" font-weight="600">External services</text>

<rect x="900" y="140" width="208" height="104" rx="9" fill="#4f2c05" stroke="#ef9f27" stroke-width="0.75"/>
<text x="1004" y="162" text-anchor="middle" fill="#facb75" font-size="12.5" font-weight="500">OpenAI image API</text>
<circle cx="1092" cy="152" r="4" fill="#5dca8d"/>
<text x="916" y="184" fill="#f6d9a4" font-size="10.5">model: gpt-image-1</text>
<text x="916" y="202" fill="#f6d9a4" font-size="10.5">called server-side, from an action</text>
<text x="916" y="220" fill="#ef9f27" font-size="9.5">OPENAI_API_KEY lives only in</text>
<text x="916" y="234" fill="#ef9f27" font-size="9.5">Convex env &#8212; never on the client</text>

<rect x="900" y="268" width="208" height="160" rx="9" fill="#2a2926" stroke="#6f6e68" stroke-width="1" stroke-dasharray="4 3"/>
<text x="1004" y="290" text-anchor="middle" fill="#9a988f" font-size="12.5" font-weight="500">Phase 2 &#8212; not built</text>
<circle cx="1092" cy="280" r="4" fill="none" stroke="#6f6e68" stroke-width="1"/>
<text x="916" y="314" fill="#7d7c75" font-size="10.5">Stripe &#8212; credit top-ups</text>
<text x="916" y="330" fill="#7d7c75" font-size="9.5">test mode</text>
<text x="916" y="354" fill="#7d7c75" font-size="10.5">Cloudflare R2 &#8212; image storage</text>
<text x="916" y="370" fill="#7d7c75" font-size="9.5">at scale</text>
<text x="916" y="394" fill="#7d7c75" font-size="10.5">Email &#8212; verify / reset</text>
<text x="916" y="410" fill="#7d7c75" font-size="9.5">deferred provider setup</text>

<!-- ============ ARROWS: frontend hooks cross the boundary ============ -->
<line x1="336" y1="172" x2="422" y2="172" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="379" y="166" text-anchor="middle" fill="#5dca8d" font-size="9.5">useQuery</text>
<line x1="336" y1="264" x2="422" y2="264" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="379" y="258" text-anchor="middle" fill="#5dca8d" font-size="9.5">useMutation</text>
<line x1="336" y1="356" x2="422" y2="356" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="379" y="350" text-anchor="middle" fill="#5dca8d" font-size="9.5">useAction</text>

<!-- action -> OpenAI -->
<line x1="846" y1="350" x2="898" y2="200" stroke="#ef9f27" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="884" y="288" text-anchor="middle" fill="#ef9f27" font-size="9.5" transform="rotate(-70 884 288)">fetch (actions only)</text>

<!-- ============ LEGEND ============ -->
<rect x="36" y="668" width="11" height="11" rx="2" fill="#45443f"/>
<text x="52" y="677" fill="#c2c0b6" font-size="10">Astro frontend</text>
<rect x="156" y="668" width="11" height="11" rx="2" fill="#0c447c"/>
<text x="172" y="677" fill="#c2c0b6" font-size="10">Convex backend</text>
<rect x="290" y="668" width="11" height="11" rx="2" fill="#633806"/>
<text x="306" y="677" fill="#c2c0b6" font-size="10">external service</text>
<rect x="416" y="668" width="11" height="11" rx="2" fill="#5b1717"/>
<text x="432" y="677" fill="#c2c0b6" font-size="10">role guard / boundary</text>
<rect x="568" y="668" width="11" height="11" rx="2" fill="#2a2926" stroke="#6f6e68" stroke-width="1"/>
<text x="584" y="677" fill="#c2c0b6" font-size="10">Phase 2 (not built)</text>
<circle cx="710" cy="673" r="4" fill="#5dca8d"/>
<text x="720" y="677" fill="#c2c0b6" font-size="10">built</text>
<circle cx="760" cy="673" r="4" fill="none" stroke="#6f6e68" stroke-width="1"/>
<text x="770" y="677" fill="#c2c0b6" font-size="10">not built</text>
<line x1="828" y1="673" x2="858" y2="673" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="864" y="677" fill="#c2c0b6" font-size="10">call / data flow</text>

<!-- ============ FOOTER ============ -->
<text x="40" y="708" fill="#b5b3aa" font-size="10">Determinism is why there are three function kinds: queries stay reactive, mutations stay transactional, and only actions give that up to touch the outside world.</text>
<text x="40" y="726" fill="#b5b3aa" font-size="10">Defense in depth: the middleware guards URL prefixes; every Convex function independently re-checks auth, role and ownership. Neither layer is sufficient alone.</text>
<text x="40" y="744" fill="#b5b3aa" font-size="10">Source: README (Tech stack), docs/concepts/convex-actions-vs-mutations.md, owner-permission-pattern.md.</text>
</svg>
