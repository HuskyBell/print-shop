<!-- ===== LEGEND ===== -->
<rect x="40" y="648" width="14" height="14" rx="3" fill="#0c3d28" stroke="#5dca8d" stroke-width="0.75"/><text x="60" y="659" fill="#c2c0b6" font-size="10">allowed</text>
<rect x="138" y="648" width="14" height="14" rx="3" fill="#5b1717" stroke="#d98a8a" stroke-width="0.75"/><text x="158" y="659" fill="#c2c0b6" font-size="10">denied</text>
<rect x="232" y="648" width="14" height="14" rx="3" fill="#712b13" stroke="#f0997b" stroke-width="0.75"/><text x="252" y="659" fill="#c2c0b6" font-size="10">own only &#8212; the computed Owner permission (record.ownerId === you), not a role</text>
<rect x="708" y="648" width="14" height="14" rx="3" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/><text x="728" y="659" fill="#c2c0b6" font-size="10">not applicable</text>

<!-- ===== COUNTEREXAMPLE CALLOUTS ===== -->
<text x="40" y="690" fill="#f5c4b3" font-size="10.5">*&#160; Moderators are NOT a superset of members: a mod may edit only their OWN design's metadata, never another member's. Admin overrides; mod does not.</text>
<text x="40" y="708" fill="#f5c4b3" font-size="10.5">&#160;&#160; Role-change has its own guards: no self-promotion, and the last admin cannot be demoted.</text>
<text x="40" y="726" fill="#f0c6c6" font-size="10.5">** No one may hard-delete an append-only ledger row &#8212; not even an admin. Mistakes are fixed with new correction rows, never by erasing history.</text>

<!-- ===== FOOTER ===== -->
<text x="40" y="756" fill="#b5b3aa" font-size="10">Two layers enforce every cell: the Astro middleware guards the URL prefix, and each Convex function re-checks auth, role, ownership and state. Neither alone is enough.</text>
<text x="40" y="774" fill="#b5b3aa" font-size="10">Source: docs/concepts/owner-permission-pattern.md, append-only-ledger.md, README (Key teaching concepts), MILESTONES M4/M8/M9/M11.</text>
</svg>
