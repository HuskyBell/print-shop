<svg width="100%" viewBox="0 0 1100 812" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Print Shop permission matrix: the four roles and the computed Owner permission against the operations each may perform.</title>
<desc>A grid. Columns are the four roles Guest, Member, Moderator and Admin. Rows are operations. Each cell shows allowed (green check), denied (red cross), own-only (coral, the computed Owner permission) or not-applicable. Two operations are highlighted as teaching counterexamples: a moderator may edit only their own design metadata, never another member's; and no role, not even an admin, may hard-delete an append-only ledger row.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>

<rect x="0" y="0" width="1100" height="812" fill="#1c1b19"/>

<text x="550" y="38" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">Print Shop permission matrix</text>
<text x="550" y="59" text-anchor="middle" fill="#b5b3aa" font-size="12">four roles + the computed Owner cross-cut &#183; who may do what &#183; as of 2026-06-16</text>

