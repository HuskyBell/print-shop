<svg width="100%" viewBox="0 0 1200 748" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Credit flow map: where credits come from and where they go, from the grant pool through user balances to generation spend and the sale split, with every move recorded as a ledger row.</title>
<desc>A money map. The admin mints credits into the grant pool. The pool grants credits to members via the signup bonus and admin grants. A member's balance is charged for image generation, refunded if the generation fails. A sale charges the buyer and splits into a designer payout and a platform cut that returns to the pool. Admin corrections adjust balances. Every arrow is one append-only creditTransactions row, and creditBalances is the cache patched in the same mutation.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1200" height="748" fill="#1c1b19"/>

<text x="600" y="38" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">Credit flow &#8212; where credits come from and go</text>
<text x="600" y="59" text-anchor="middle" fill="#b5b3aa" font-size="12">mint &#8594; grant &#8594; spend &#8594; split &#8594; corrections &#183; every move is one append-only ledger row &#183; as of 2026-06-16</text>

<!-- Admin -->
<rect x="60" y="100" width="160" height="56" rx="10" fill="#633806" stroke="#ef9f27" stroke-width="0.75"/>
<text x="140" y="124" text-anchor="middle" fill="#facb75" font-size="12.5" font-weight="600">Admin</text>
<text x="140" y="142" text-anchor="middle" fill="#ef9f27" font-size="9.5">mints, grants, corrects</text>

<!-- grantPool -->
<rect x="60" y="300" width="200" height="104" rx="11" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/>
<text x="160" y="328" text-anchor="middle" fill="#d3d1c7" font-size="12.5" font-weight="600">grantPool</text>
<text x="160" y="348" text-anchor="middle" fill="#9a988f" font-size="9.5">the reserve (singleton)</text>
<text x="160" y="364" text-anchor="middle" fill="#9a988f" font-size="9.5">source of all grants</text>
<text x="160" y="384" text-anchor="middle" fill="#9a988f" font-size="9.5">receives the platform cut</text>

<!-- User balance -->
<rect x="500" y="278" width="230" height="124" rx="12" fill="#085041" stroke="#5dcaa5" stroke-width="1"/>
<text x="615" y="306" text-anchor="middle" fill="#9fe1cb" font-size="13" font-weight="600">creditBalances</text>
<text x="615" y="326" text-anchor="middle" fill="#c6efe0" font-size="10">a member's balance</text>
<text x="615" y="346" text-anchor="middle" fill="#c6efe0" font-size="10">= SUM of their ledger rows</text>
<text x="615" y="368" text-anchor="middle" fill="#5dcaa5" font-size="9">cache, patched atomically with</text>
<text x="615" y="382" text-anchor="middle" fill="#5dcaa5" font-size="9">each creditTransactions write</text>

<!-- Generation -->
<rect x="960" y="108" width="200" height="92" rx="11" fill="#0c447c" stroke="#85b7eb" stroke-width="0.75"/>
<text x="1060" y="136" text-anchor="middle" fill="#b5d4f4" font-size="12.5" font-weight="600">generation</text>
<text x="1060" y="156" text-anchor="middle" fill="#85b7eb" font-size="9.5">consumes credits</text>
<text x="1060" y="172" text-anchor="middle" fill="#85b7eb" font-size="9.5">the OpenAI image</text>
<text x="1060" y="190" text-anchor="middle" fill="#85b7eb" font-size="9">cost set by the preset</text>

<!-- Sale -->
<rect x="500" y="540" width="230" height="86" rx="11" fill="#0c447c" stroke="#85b7eb" stroke-width="0.75"/>
<text x="615" y="568" text-anchor="middle" fill="#b5d4f4" font-size="12.5" font-weight="600">a sale &#8212; placeOrder()</text>
<text x="615" y="588" text-anchor="middle" fill="#85b7eb" font-size="9.5">one atomic mutation</text>
<text x="615" y="606" text-anchor="middle" fill="#85b7eb" font-size="9.5">splits into three rows</text>

<!-- Designer -->
<rect x="960" y="540" width="200" height="86" rx="11" fill="#085041" stroke="#5dcaa5" stroke-width="0.75"/>
<text x="1060" y="568" text-anchor="middle" fill="#9fe1cb" font-size="12.5" font-weight="600">designer's balance</text>
<text x="1060" y="588" text-anchor="middle" fill="#c6efe0" font-size="9.5">earns the payout</text>
<text x="1060" y="606" text-anchor="middle" fill="#5dcaa5" font-size="9">at their snapshotted tier %</text>

<!-- 1 Admin -> pool (mint) -->
<line x1="140" y1="156" x2="140" y2="298" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="148" y="232" fill="#5dca8d" font-size="9.5">mint</text>

<!-- 2 pool -> user (grants) -->
<line x1="260" y1="340" x2="498" y2="332" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="379" y="324" text-anchor="middle" fill="#5dca8d" font-size="9.5">signup bonus (auto) &#183; admin grant</text>

<!-- 3 Admin -> user (correction) -->
<line x1="222" y1="132" x2="558" y2="276" stroke="#f0997b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="404" y="190" text-anchor="middle" fill="#f0997b" font-size="9.5">admin_correction (&#177;)</text>

<!-- 4 user -> generation (charge) -->
<line x1="730" y1="320" x2="958" y2="170" stroke="#d98a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="852" y="232" text-anchor="middle" fill="#d98a8a" font-size="9.5">generation_charge (&#8722;)</text>

<!-- 5 generation -> user (refund) -->
<line x1="958" y1="196" x2="732" y2="352" stroke="#5dca8d" stroke-width="1.25" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="846" y="290" text-anchor="middle" fill="#5dca8d" font-size="9.5">generation_refund (+) on failure</text>

<!-- 6 user -> sale (purchase) -->
<line x1="615" y1="402" x2="615" y2="538" stroke="#d98a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="623" y="474" fill="#d98a8a" font-size="9.5">purchase_charge (&#8722;)</text>

<!-- 7 sale -> designer (payout) -->
<line x1="730" y1="583" x2="958" y2="583" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="844" y="575" text-anchor="middle" fill="#5dca8d" font-size="9.5">designer_payout (+)</text>

<!-- 8 sale -> pool (platform cut), elbow -->
<path d="M500 580 H330 V406" fill="none" stroke="#ef9f27" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="338" y="500" fill="#ef9f27" font-size="9.5">platform_cut (+)</text>

<!-- ledger strip -->
<rect x="60" y="650" width="1100" height="44" rx="9" fill="#5b1717" stroke="#d98a8a" stroke-width="0.75"/>
<text x="76" y="670" fill="#f0c6c6" font-size="11" font-weight="600">The ledger is the truth</text>
<text x="76" y="687" fill="#f0c6c6" font-size="10">Every arrow above is one row in creditTransactions (append-only). creditBalances is patched in the same mutation. Refunds &amp; corrections are NEW rows, never edits. Reconcile: balance == SUM(amount).</text>

<!-- legend -->
<line x1="60" y1="716" x2="88" y2="716" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/><text x="94" y="720" fill="#c2c0b6" font-size="10">credit in (+)</text>
<line x1="190" y1="716" x2="218" y2="716" stroke="#d98a8a" stroke-width="1.5" marker-end="url(#arrow)"/><text x="224" y="720" fill="#c2c0b6" font-size="10">credit out (&#8722;)</text>
<line x1="318" y1="716" x2="346" y2="716" stroke="#ef9f27" stroke-width="1.5" marker-end="url(#arrow)"/><text x="352" y="720" fill="#c2c0b6" font-size="10">platform cut</text>
<line x1="448" y1="716" x2="476" y2="716" stroke="#f0997b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/><text x="482" y="720" fill="#c2c0b6" font-size="10">correction (&#177;)</text>
<rect x="588" y="710" width="12" height="12" rx="2" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/><text x="606" y="720" fill="#c2c0b6" font-size="10">pool / cache</text>
<rect x="700" y="710" width="12" height="12" rx="2" fill="#085041"/><text x="718" y="720" fill="#c2c0b6" font-size="10">user / designer balance</text>
<text x="880" y="720" fill="#b5b3aa" font-size="10">Source: append-only-ledger.md, snapshot-rule.md, MILESTONES M5/M7/M9.</text>
</svg>
