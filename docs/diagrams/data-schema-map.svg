<text x="878" y="260" fill="#f0c6c6" font-size="11" font-weight="600">orders&#160;&#160;<tspan font-size="9" font-weight="400">append-only &#183; status placed &#8594; refunded</tspan></text>
<text x="878" y="278" fill="#d98a8a" font-size="9">buyerId&#8594;users &#183; designerId&#8594;users &#183; designId&#8594;designs</text>
<text x="878" y="294" fill="#d98a8a" font-size="9">snapshots: price, tierName, sharePercent, creditDollarValue</text>

