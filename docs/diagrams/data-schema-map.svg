<text x="478" y="276" fill="#85b7eb" font-size="9">substring match</text>
<text x="478" y="290" fill="#85b7eb" font-size="9">admin-managed</text>
<rect x="648" y="240" width="166" height="58" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="660" y="260" fill="#b5d4f4" font-size="11" font-weight="600">rateLimitBuckets</text>
<text x="660" y="276" fill="#85b7eb" font-size="9">userId &#183; bucket (per-hour)</text>
