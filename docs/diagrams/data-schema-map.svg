<text x="58" y="470" fill="#9a988f" font-size="9">cache of SUM(amount)</text>
<text x="58" y="484" fill="#9a988f" font-size="9">userId&#8594;users &#183; balance</text>
<rect x="236" y="434" width="178" height="58" rx="9" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/>
<text x="248" y="454" fill="#d3d1c7" font-size="11" font-weight="600">grantPool</text>
<text x="248" y="470" fill="#9a988f" font-size="9">singleton reserve</text>
<text x="248" y="484" fill="#9a988f" font-size="9">balance</text>

