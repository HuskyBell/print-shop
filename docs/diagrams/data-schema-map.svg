<svg width="100%" viewBox="0 0 1300 880" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Print Shop schema map: the Convex tables grouped by domain, coloured by storage kind, with foreign keys and the users hub.</title>
<desc>A data model map. Tables are grouped into domains: identity and RBAC, the credit economy, generation, platform config, the marketplace, and curation and moderation. Each table node names its key fields and foreign keys. Colour marks the storage kind: mutable, append-only, cache or singleton, and join table, with the users table as the central hub. Arrows are foreign keys pointing from child to parent.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1300" height="880" fill="#1c1b19"/>

<text x="650" y="38" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">Schema map &#8212; tables, foreign keys, storage kind</text>
<text x="650" y="59" text-anchor="middle" fill="#b5b3aa" font-size="12">convex/schema.ts, grouped by domain &#183; arrows are foreign keys (child &#8594; parent) &#183; as of 2026-06-16</text>

