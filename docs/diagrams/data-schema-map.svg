<!-- hub note -->
<rect x="450" y="446" width="380" height="100" rx="10" fill="#06352b" stroke="#5dcaa5" stroke-width="0.75"/>
<text x="466" y="468" fill="#9fe1cb" font-size="11" font-weight="600">users is the hub</text>
<text x="466" y="488" fill="#c6efe0" font-size="9.5">designs, generations, orders, creditTransactions, creditBalances,</text>
<text x="466" y="503" fill="#c6efe0" font-size="9.5">collections, flags and both *History tables all carry a userId/</text>
<text x="466" y="518" fill="#c6efe0" font-size="9.5">ownerId foreign key to users (annotated on each node above).</text>
<text x="466" y="536" fill="#5dcaa5" font-size="9">Cross-cluster FKs are shown as text, not lines, to keep the map legible.</text>

<!-- legend -->
<rect x="30" y="572" width="14" height="14" rx="3" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/><text x="50" y="583" fill="#c2c0b6" font-size="10">mutable (edit freely)</text>
<rect x="190" y="572" width="14" height="14" rx="3" fill="#5b1717" stroke="#d98a8a" stroke-width="0.75"/><text x="210" y="583" fill="#c2c0b6" font-size="10">append-only (never UPDATE/DELETE)</text>
<rect x="430" y="572" width="14" height="14" rx="3" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/><text x="450" y="583" fill="#c2c0b6" font-size="10">cache / singleton</text>
<rect x="580" y="572" width="14" height="14" rx="3" fill="#3c3489" stroke="#afa9ec" stroke-width="0.75"/><text x="600" y="583" fill="#c2c0b6" font-size="10">join table</text>
<rect x="680" y="572" width="14" height="14" rx="3" fill="#085041" stroke="#5dcaa5" stroke-width="0.75"/><text x="700" y="583" fill="#c2c0b6" font-size="10">users (hub)</text>
<line x1="790" y1="579" x2="818" y2="579" stroke="#8a8980" stroke-width="1.25" marker-end="url(#arrow)"/><text x="824" y="583" fill="#c2c0b6" font-size="10">foreign key (child &#8594; parent)</text>

<text x="30" y="612" fill="#b5b3aa" font-size="10">Schema-first: every table is defined in convex/schema.ts before any function reads it. Soft delete (archivedAt) for most tables; the ledgers are strictly append-only.</text>
<text x="30" y="630" fill="#b5b3aa" font-size="10">Source: MILESTONES.md (per-milestone tables), docs/concepts/append-only-ledger.md, snapshot-rule.md, owner-permission-pattern.md, README (Conventions).</text>
</svg>
