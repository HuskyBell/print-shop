<text x="1081" y="500" fill="#85b7eb" font-size="9">targetType/targetId (poly)</text>

<!-- within-cluster FK edges -->
<line x1="135" y1="178" x2="135" y2="172" stroke="#8a8980" stroke-width="1.25" marker-end="url(#arrow)"/>
<text x="142" y="176" fill="#8a8980" font-size="8">tierId</text>
<line x1="321" y1="178" x2="250" y2="172" stroke="#8a8980" stroke-width="1.25" marker-end="url(#arrow)"/>
<line x1="640" y1="174" x2="600" y2="166" stroke="#8a8980" stroke-width="1.25" marker-end="url(#arrow)"/>
<text x="612" y="172" fill="#8a8980" font-size="8">presetId</text>
<line x1="958" y1="182" x2="958" y2="174" stroke="#8a8980" stroke-width="1.25" marker-end="url(#arrow)"/>
<text x="964" y="180" fill="#8a8980" font-size="8">categoryId</text>
<line x1="1000" y1="240" x2="1000" y2="174" stroke="#8a8980" stroke-width="1.25" marker-end="url(#arrow)"/>
<text x="1006" y="220" fill="#8a8980" font-size="8">designId</text>
<line x1="958" y1="450" x2="958" y2="442" stroke="#8a8980" stroke-width="1.25" marker-end="url(#arrow)"/>
