<text x="58" y="136" fill="#9fe1cb" font-size="12" font-weight="600">users&#160;&#160;<tspan fill="#5dcaa5" font-size="9" font-weight="400">the hub</tspan></text>
<text x="58" y="158" fill="#c6efe0" font-size="9">role &#183; tierId&#8594;earningTiers &#183; handle &#183; displayName &#183; archivedAt (soft delete)</text>
<rect x="46" y="178" width="178" height="58" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="58" y="198" fill="#b5d4f4" font-size="11" font-weight="600">earningTiers</text>
<text x="58" y="214" fill="#85b7eb" font-size="9">sharePercent</text>
<text x="58" y="228" fill="#85b7eb" font-size="9">isDefault &#183; archivedAt</text>
<rect x="236" y="178" width="178" height="58" rx="9" fill="#5b1717" stroke="#d98a8a" stroke-width="0.75"/>
<text x="248" y="198" fill="#f0c6c6" font-size="11" font-weight="600">userRoleHistory</text>
<text x="248" y="214" fill="#d98a8a" font-size="9">append-only &#183; userId&#8594;users</text>
<text x="248" y="228" fill="#d98a8a" font-size="9">fromRole, toRole, changedBy</text>
<rect x="46" y="244" width="368" height="56" rx="9" fill="#5b1717" stroke="#d98a8a" stroke-width="0.75"/>
<text x="58" y="264" fill="#f0c6c6" font-size="11" font-weight="600">userTierHistory</text>
<text x="58" y="282" fill="#d98a8a" font-size="9">append-only &#183; userId&#8594;users &#183; fromTier, toTier, changedBy, reason</text>

<!-- ===== CREDIT ECONOMY ===== -->
<rect x="30" y="332" width="400" height="216" rx="12" fill="none" stroke="#6f6e68" stroke-width="0.75"/>
<text x="44" y="352" fill="#c2c0b6" font-size="11" font-weight="600">Credit economy</text>
