<text x="58" y="416" fill="#d98a8a" font-size="9">snapshots + relatedDesignId&#8594;designs &#183; relatedOrderId&#8594;orders</text>
<rect x="46" y="434" width="178" height="58" rx="9" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/>
