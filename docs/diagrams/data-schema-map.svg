<text x="878" y="218" fill="#85b7eb" font-size="9">name &#183; slug</text>
<rect x="1069" y="182" width="185" height="50" rx="9" fill="#0a3a6b" stroke="#85b7eb" stroke-width="0.75"/>
<text x="1081" y="201" fill="#b5d4f4" font-size="11" font-weight="600">productTypes</text>
<text x="1081" y="218" fill="#85b7eb" font-size="9">sticker/mug/tee/poster &#183; price</text>
