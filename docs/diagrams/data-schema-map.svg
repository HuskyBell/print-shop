<!-- ===== CONFIG ===== -->
<rect x="450" y="332" width="380" height="96" rx="12" fill="none" stroke="#6f6e68" stroke-width="0.75"/>
<text x="464" y="352" fill="#c2c0b6" font-size="11" font-weight="600">Platform config</text>
<rect x="466" y="362" width="348" height="54" rx="9" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/>
<text x="478" y="382" fill="#d3d1c7" font-size="11" font-weight="600">platformSettings&#160;&#160;<tspan font-size="9" font-weight="400" fill="#9a988f">singleton</tspan></text>
