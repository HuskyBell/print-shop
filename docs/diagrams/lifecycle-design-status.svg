<svg width="100%" viewBox="0 0 1180 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Design status lifecycle: how a design moves from generated through pending, approved, rejected and removed, and who triggers each transition.</title>
<desc>A state machine. A generated gallery image is published by its owner to become pending. A moderator or admin approves it (setting publishedAt) to make it approved and public, or rejects it with a reason to make it rejected. The owner can edit a rejected design and resubmit it to pending. An approved design can be removed or unpublished by the owner, a moderator or an admin, becoming removed, a soft-deleted terminal state. Only the approved state is publicly visible.</desc>
<style>
text { font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1180" height="600" fill="#1c1b19"/>

<text x="590" y="38" text-anchor="middle" fill="#faf9f5" font-size="18" font-weight="600">Design status lifecycle</text>
<text x="590" y="59" text-anchor="middle" fill="#b5b3aa" font-size="12">pending &#8594; approved / rejected / removed &#183; the transition trigger (and who) rides each arrow &#183; as of 2026-06-16</text>

<!-- start -->
<circle cx="48" cy="300" r="8" fill="#faf9f5"/>
<line x1="56" y1="300" x2="96" y2="300" stroke="#8a8980" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- generated -->
<rect x="98" y="270" width="156" height="64" rx="10" fill="#45443f" stroke="#b4b2a9" stroke-width="0.75"/>
<text x="176" y="296" text-anchor="middle" fill="#d3d1c7" font-size="12.5" font-weight="600">generated</text>
<text x="176" y="314" text-anchor="middle" fill="#b4b2a9" font-size="9.5">in /mem/gallery (M6)</text>
<text x="176" y="328" text-anchor="middle" fill="#7d7c75" font-size="9">private to owner</text>

<!-- generated -> pending -->
<line x1="254" y1="300" x2="368" y2="300" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="311" y="292" text-anchor="middle" fill="#5dca8d" font-size="9.5">publish</text>
<text x="311" y="316" text-anchor="middle" fill="#8a8980" font-size="8.5">owner</text>

<!-- pending -->
<rect x="370" y="266" width="180" height="72" rx="10" fill="#633806" stroke="#ef9f27" stroke-width="1"/>
<text x="460" y="292" text-anchor="middle" fill="#facb75" font-size="13" font-weight="600">pending</text>
<text x="460" y="310" text-anchor="middle" fill="#f6d9a4" font-size="9.5">awaiting review</text>
<text x="460" y="326" text-anchor="middle" fill="#ef9f27" font-size="9">private &#183; owner + mods/admins</text>

<!-- pending -> approved -->
<line x1="540" y1="278" x2="706" y2="180" stroke="#5dca8d" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="612" y="216" text-anchor="middle" fill="#5dca8d" font-size="9.5">approve &#183; sets publishedAt</text>
<text x="612" y="230" text-anchor="middle" fill="#8a8980" font-size="8.5">moderator / admin</text>

<!-- pending -> rejected -->
<line x1="540" y1="326" x2="706" y2="424" stroke="#ef9f27" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="612" y="372" text-anchor="middle" fill="#ef9f27" font-size="9.5">reject &#183; with reason</text>
<text x="612" y="386" text-anchor="middle" fill="#8a8980" font-size="8.5">moderator / admin</text>

<!-- approved -->
<rect x="708" y="120" width="194" height="74" rx="10" fill="#0c3d28" stroke="#5dca8d" stroke-width="1"/>
<text x="805" y="146" text-anchor="middle" fill="#9ce6bb" font-size="13" font-weight="600">approved</text>
<text x="805" y="164" text-anchor="middle" fill="#d6f3e3" font-size="9.5">live on /browse, home, profile</text>
<text x="805" y="180" text-anchor="middle" fill="#5dca8d" font-size="9">PUBLIC &#8212; visible to everyone</text>

<!-- rejected -->
<rect x="708" y="410" width="194" height="74" rx="10" fill="#5b1717" stroke="#d98a8a" stroke-width="1"/>
<text x="805" y="436" text-anchor="middle" fill="#f0c6c6" font-size="13" font-weight="600">rejected</text>
<text x="805" y="454" text-anchor="middle" fill="#d98a8a" font-size="9.5">reason recorded</text>
<text x="805" y="470" text-anchor="middle" fill="#d98a8a" font-size="9">private &#183; owner + mods/admins</text>

<!-- rejected -> pending (resubmit), elbow under -->
<path d="M708 470 H470 V342" fill="none" stroke="#5dcaa5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="556" y="486" text-anchor="middle" fill="#5dcaa5" font-size="9.5">edit metadata + resubmit (owner)</text>

<!-- approved -> removed -->
<line x1="902" y1="166" x2="1000" y2="276" stroke="#d98a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="990" y="206" text-anchor="middle" fill="#d98a8a" font-size="9.5">remove / unpublish</text>
<text x="990" y="220" text-anchor="middle" fill="#8a8980" font-size="8.5">owner / mod / admin</text>

<!-- rejected -> removed -->
<line x1="902" y1="446" x2="1004" y2="330" stroke="#d98a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="980" y="402" text-anchor="middle" fill="#d98a8a" font-size="9.5">remove</text>

<!-- removed terminal (double ring) -->
<rect x="988" y="266" width="160" height="68" rx="10" fill="#2a2926" stroke="#6f6e68" stroke-width="0.75"/>
<rect x="982" y="260" width="172" height="80" rx="13" fill="none" stroke="#6f6e68" stroke-width="1"/>
<text x="1068" y="294" text-anchor="middle" fill="#9a988f" font-size="13" font-weight="600">removed</text>
<text x="1068" y="312" text-anchor="middle" fill="#7d7c75" font-size="9.5">soft delete (status only)</text>
<text x="1068" y="326" text-anchor="middle" fill="#7d7c75" font-size="9">hidden &#183; row never hard-deleted</text>

<!-- legend -->
<rect x="48" y="528" width="14" height="14" rx="3" fill="#45443f" stroke="#b4b2a9" stroke-width="0.75"/><text x="68" y="539" fill="#c2c0b6" font-size="10">pre-publish</text>
<rect x="158" y="528" width="14" height="14" rx="3" fill="#633806" stroke="#ef9f27" stroke-width="0.75"/><text x="178" y="539" fill="#c2c0b6" font-size="10">pending</text>
<rect x="248" y="528" width="14" height="14" rx="3" fill="#0c3d28" stroke="#5dca8d" stroke-width="0.75"/><text x="268" y="539" fill="#c2c0b6" font-size="10">approved (public)</text>
<rect x="388" y="528" width="14" height="14" rx="3" fill="#5b1717" stroke="#d98a8a" stroke-width="0.75"/><text x="408" y="539" fill="#c2c0b6" font-size="10">rejected</text>
<rect x="478" y="528" width="14" height="14" rx="3" fill="#2a2926" stroke="#6f6e68" stroke-width="1"/><text x="498" y="539" fill="#c2c0b6" font-size="10">removed (terminal)</text>
<circle cx="635" cy="535" r="6" fill="#faf9f5"/><text x="648" y="539" fill="#c2c0b6" font-size="10">start</text>

<text x="48" y="566" fill="#b5b3aa" font-size="10">The same row looks different by role: the owner sees their pending design, a mod sees all pending, the public sees only approved. Mods act on the moderation surface; metadata edits are owner-only (and blocked once approved).</text>
<text x="48" y="584" fill="#b5b3aa" font-size="10">Source: MILESTONES.md M8, docs/concepts/owner-permission-pattern.md (visibility + conditional-on-state).</text>
</svg>
